{% set name = "opentelemetry-instrumentation-elasticsearch" %}
{% set version = "0.62b1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/opentelemetry_instrumentation_elasticsearch-{{ version }}.tar.gz
  sha256: 79c5a6bd0ac62acbacbe8aafbb361a2f0c58e07288f65f5495bce6c03f521d6d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}
    - opentelemetry-api ~=1.12
    - opentelemetry-instrumentation ==0.62b1
    - opentelemetry-semantic-conventions ==0.62b1
    - wrapt <3.0.0,>=1.0.0
    # - opentelemetry-test-utils ==0.37b0
